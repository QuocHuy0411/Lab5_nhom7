<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crypto App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Cryptography Application</h1>

  <div id="menu">
    <h2>Select Cryptography Type</h2>
    <button onclick="showSection('symmetric')">1. Symmetric</button>
    <button onclick="showSection('asymmetric')">2. Asymmetric</button>
    <button onclick="showSection('hash')">3. Hash</button>
  </div>

  <!-- SYMMETRIC ENCRYPTION SECTION -->
  <div id="symmetric" class="hidden">
    <h2>Symmetric Encryption</h2>

    <h3>Choose a Specific Algorithm</h3>
    <div class="algorithm-buttons">
      <button onclick="selectAlgorithm('DES')" class="algo-btn" id="btn-DES">DES</button>
      <button onclick="selectAlgorithm('3DES')" class="algo-btn" id="btn-3DES">3DES</button>
      <button onclick="selectAlgorithm('AES')" class="algo-btn" id="btn-AES">AES</button>
    </div>

    <p id="selectedAlgorithm" style="color: green; font-weight: bold;"></p>

    <h3>Encryption Key</h3>
    <textarea id="symmetricKey" placeholder="Enter or generate encryption key..."></textarea>

    <button onclick="generateSymmetricKey()">Generate Key</button>

    <h3>Input Data</h3>
    <textarea id="symmetricInput" placeholder="Enter plaintext or ciphertext..."></textarea>

    <button onclick="encryptSymmetricUI()">Encrypt</button>
    <button onclick="decryptSymmetricUI()">Decrypt</button>

    <h3>Output</h3>
    <textarea id="symmetricOutput" readonly></textarea>

    <button onclick="copyResult('symmetricOutput')">Copy Result</button>
    <button onclick="tryAgainSymmetric()">Try Again</button>
    <button onclick="goBack()">Back</button>

    <p id="symmetricErrorMsg" class="error"></p>
  </div>

  <div id="asymmetric" class="hidden">
    <h2>Asymmetric Encryption (RSA)</h2>

    <button onclick="generateKeysUI()">Auto-generate Key</button>

    <h3>Public Key</h3>
    <textarea id="publicKey"></textarea>

    <h3>Private Key</h3>
    <textarea id="privateKey"></textarea>

    <h3>Input Data</h3>
    <textarea id="inputData" placeholder="Enter plaintext or ciphertext..."></textarea>

    <button onclick="encryptUI()">Encrypt</button>
    <button onclick="decryptUI()">Decrypt</button>

    <h3>Output</h3>
    <textarea id="outputData" readonly></textarea>

    <button onclick="copyResult()">Copy Result</button>
    <button onclick="tryAgain()">Try Again</button>
    <button onclick="goBack()">Back</button>

    <p id="errorMsg" class="error"></p>
  </div>
</div>

<!-- 🔥 CHỖ QUAN TRỌNG ĐÃ ĐỔI -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="symmetric/des.js"></script>
<script src="symmetric/3des.js"></script>
<script src="symmetric/aes.js"></script>
<script src="5_N23DCCN162_NguyenNgocQuocHuy/rsa.js"></script>
<script src="5_N23DCCN162_NguyenNgocQuocHuy/rsa-ui.js"></script>
<script>
function showSection(section) {
  document.getElementById('menu').classList.add('hidden');
  document.getElementById(section).classList.remove('hidden');
}

function goBack() {
  location.reload();
}

function tryAgain() {
  document.getElementById('inputData').value = '';
  document.getElementById('outputData').value = '';
  document.getElementById('errorMsg').innerText = '';
}

async function copyResult(elementId = 'outputData') {
  const text = document.getElementById(elementId).value;
  if (!text) return alert('Nothing to copy');

  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    alert('Copied!');
  } else {
    const temp = document.createElement('textarea');
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand('copy');
    document.body.removeChild(temp);
    alert('Copied (fallback)!');
  }
}

// ============ SYMMETRIC ENCRYPTION FUNCTIONS ============
let selectedSymmetricAlgorithm = null;

function selectAlgorithm(algorithm) {
  selectedSymmetricAlgorithm = algorithm;
  document.getElementById('selectedAlgorithm').innerText = '✓ Selected: ' + algorithm;
  
  // Highlight selected button
  document.querySelectorAll('.algo-btn').forEach(btn => {
    btn.style.backgroundColor = '';
  });
  document.getElementById('btn-' + algorithm).style.backgroundColor = '#4CAF50';
  document.getElementById('btn-' + algorithm).style.color = 'white';
}

function generateSymmetricKey() {
  if (!selectedSymmetricAlgorithm) {
    alert('Please select an algorithm first!');
    return;
  }
  
  let keyLength;
  switch(selectedSymmetricAlgorithm) {
    case 'DES':
      keyLength = 8; // 64 bits
      break;
    case '3DES':
      keyLength = 24; // 192 bits (3 × 64)
      break;
    case 'AES':
      keyLength = 32; // 256 bits
      break;
  }
  
  // Generate random key
  const key = Array.from({length: keyLength}, () => 
    Math.floor(Math.random() * 256).toString(16).padStart(2, '0')
  ).join('');
  
  document.getElementById('symmetricKey').value = key;
  clearSymmetricError();
}

function clearSymmetricError() {
  document.getElementById('symmetricErrorMsg').innerText = '';
}

function showSymmetricError(msg) {
  document.getElementById('symmetricErrorMsg').innerText = msg;
}

async function encryptSymmetricUI() {
  try {
    clearSymmetricError();
    
    if (!selectedSymmetricAlgorithm) {
      throw new Error('Please select an algorithm first!');
    }
    
    const inputText = document.getElementById('symmetricInput').value;
    const keyHex = document.getElementById('symmetricKey').value;
    
    if (!inputText || !keyHex) {
      throw new Error('Missing input data or key!');
    }
    
    // Placeholder: actual encryption would use crypto library
    let result;
    if (selectedSymmetricAlgorithm === 'DES') {
      result = encryptDES(inputText, keyHex);
    } else {
      throw new Error(selectedSymmetricAlgorithm + ' not implemented yet.');
    }
    document.getElementById('symmetricOutput').value = result;
      
  } catch (e) {
    showSymmetricError('Encryption failed: ' + e.message);
  }
}

async function decryptSymmetricUI() {
  try {
    clearSymmetricError();
    
    if (!selectedSymmetricAlgorithm) {
      throw new Error('Please select an algorithm first!');
    }
    
    const inputText = document.getElementById('symmetricInput').value;
    const keyHex = document.getElementById('symmetricKey').value.trim();
    
    if (!inputText || !keyHex) {
      throw new Error('Missing input data or key!');
    }
    
    // Placeholder: actual decryption would use crypto library
   let result;
    if (selectedSymmetricAlgorithm === 'DES') {
      result = decryptDES(inputText, keyHex);
    } else {
      throw new Error(selectedSymmetricAlgorithm + ' not implemented yet.');
    }
    document.getElementById('symmetricOutput').value = result;
  } catch (e) {
    showSymmetricError('Decryption failed: ' + e.message);
  }
}

function tryAgainSymmetric() {
  document.getElementById('symmetricInput').value = '';
  document.getElementById('symmetricOutput').value = '';
  document.getElementById('symmetricErrorMsg').innerText = '';
}
</script>
</body>
</html>
